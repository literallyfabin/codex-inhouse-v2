services:
  - type: web
    name: codex-inhouse-v2
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.5
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: ADMIN_DISCORD_IDS
        value: "904365027136512021"
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_GATEWAY_ENABLED
        value: "true"
      - key: RIOT_API_KEY
        sync: false
      - key: RIOT_TOURNAMENT_CODES_ENABLED
        value: "false"
      - key: WEBHOOK_URL
        sync: false
      - key: RIOT_CLIENT_ID
        sync: false
      - key: RIOT_CLIENT_SECRET
        sync: false
      - key: RIOT_VERIFICATION_TOKEN
        sync: false
